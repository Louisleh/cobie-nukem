name: Godot release gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: godot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot 4.7 stable and export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Record toolchain
        run: |
          godot --version | tee godot-version.txt
          python3 --version | tee python-version.txt

      - name: Run full validation and export matrix
        env:
          GODOT_BIN: godot
          QA_EXPORTS: "1"
        run: |
          set -o pipefail
          bash tools/release_validate.sh | tee validation.log

      - name: Package Web, itch.io, and unsigned macOS deliverables
        env:
          SKIP_VALIDATION: "1"
        run: bash tools/package_release.sh

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: cobie-nukem-validation-${{ github.sha }}
          path: |
            validation.log
            godot-version.txt
            python-version.txt
            builds/packages/SHA256SUMS.txt
          if-no-files-found: error

      - name: Upload Web export
        uses: actions/upload-artifact@v4
        with:
          name: cobie-nukem-web-${{ github.sha }}
          path: builds/web
          if-no-files-found: error

      - name: Upload itch.io package
        uses: actions/upload-artifact@v4
        with:
          name: cobie-nukem-itch-${{ github.sha }}
          path: builds/packages/*-itch.zip
          if-no-files-found: error

      - name: Upload unsigned macOS package
        uses: actions/upload-artifact@v4
        with:
          name: cobie-nukem-macos-unsigned-${{ github.sha }}
          path: builds/packages/*-macos-unsigned.zip
          if-no-files-found: error
