[preset.1]

name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="builds/*,tests/*,.github/*"
export_path="builds/web/index.html"
script_export_mode=2

[preset.1.options]

variant/extensions_support=false
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=true
html/export_icon=true
html/custom_html_shell=""
html/head_include="<style>html,body,#canvas{width:100%;height:100%;}#canvas{position:fixed;inset:0;visibility:hidden}</style><script>document.addEventListener('DOMContentLoaded',()=>{const c=document.getElementById('canvas');const reveal=()=>requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.visibility='visible'}));if(!document.getElementById('status')){reveal();return}const o=new MutationObserver(()=>{if(!document.getElementById('status')){o.disconnect();reveal()}});o.observe(document.body,{childList:true})});</script>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
