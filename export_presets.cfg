[preset.0]

name="macOS"
platform="macOS"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="builds/*,tests/*,.github/*"
export_path="builds/macos/CobieNukem.zip"
script_export_mode=2

[preset.0.options]

binary_format/architecture="universal"
application/bundle_identifier="com.louislehmann.cobienukem"
application/short_version="0.1.0"
application/version="0.1.0"
application/copyright="Copyright 2026 Louis Lehmann"
display/high_res=true
codesign/codesign=0
