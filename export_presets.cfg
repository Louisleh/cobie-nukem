vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=true
html/export_icon=true
html/custom_html_shell=""
html/head_include="<meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'><style>html,body,#canvas{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}#canvas{position:fixed;inset:0;visibility:hidden}#status{font-family:system-ui,sans-serif;letter-spacing:.08em}#status::after{content:'DOWNLOADING GAME — FIRST LOAD MAY TAKE A MOMENT';position:absolute;left:10%;right:10%;bottom:12%;text-align:center;color:#ffc34d;font-size:clamp(12px,2vw,18px);text-shadow:0 2px 4px #000}</style><script>document.addEventListener('DOMContentLoaded',()=>{const c=document.getElementById('canvas');c.tabIndex=0;c.addEventListener('pointerdown',()=>c.focus(),{passive:true});const reveal=()=>requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.visibility='visible';c.focus()}));if(!document.getElementById('status')){reveal();return}const o=new MutationObserver(()=>{if(!document.getElementById('status')){o.disconnect();reveal()}});o.observe(document.body,{childList:true,subtree:true})});</script>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
