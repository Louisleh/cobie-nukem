  - Define bounded implementation seams for Gull behavior, pressure limits, typed boss phases, modules, rewards, and resets.
  - Call out unbounded or double-fired state transitions.
focused_tests:
  - bash tools/run_godot_test.sh tests/unit/umbrella_shield_enforcer_test.gd 60
  - bash tools/run_godot_test.sh tests/integration/vancouver_mission_host_test.gd 60
evidence_required:
