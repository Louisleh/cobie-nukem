work_id: rain-city-audit-art-audio-performance
role: spark-performance-auditor
goal: Audit the Vancouver beta presentation, asset pipeline, audio, captions, rain/VFX, temporary-node ownership, and Web/native performance risks against the approved Rain City Visual Foundry production pass.
