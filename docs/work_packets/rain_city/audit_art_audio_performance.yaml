  - bash tools/run_godot_test.sh tests/unit/visual_capture_manifest_test.gd 60
evidence_required:
  - Structured result contract with model identity and no changed files.
out_of_scope:
  - Implementation, Blender/MCP operations, human visual or audio acceptance.
time_limit_minutes: 25
