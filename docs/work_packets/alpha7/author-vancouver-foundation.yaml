behavioral_contract: ContentManifest optionally owns a MissionRouteDefinition. Mission 2 authors ordered downtown_alley, ruse_block, waterfront_seawall, terminal_service, and harbour_pier zones with finite bounds, spawn volumes, patrol paths, prop-set IDs, surface IDs, checkpoint IDs, secret IDs, and stable route edges. Encounter zones exactly match route zones and use schema-v2 waves; the citation convoy is a reusable three-wave harbour_pier encounter. The mission remains locked and unrouted.
acceptance_criteria:
  - Route validation rejects duplicate/empty IDs, non-finite or empty bounds, invalid path points, unknown edges, invalid checkpoint order, and encounter/zone mismatches.
  - All five zones are ordered and reachable from the first to last zone by the authored directed edges.
  - Every zone has at least one finite spawn volume, one patrol path with two or more finite points, a prop-set ID, and surface identities.
  - Vancouver encounters use schema_version 2 and authored waves; no v1 spawns remain.
  - Harbour pier citation convoy contains three waves and uses only existing enemy contracts within a finite budget.
  - Deterministic non-rendered route simulation validates objective order, checkpoint order, encounter reset data, and no dead end.
  - Rain City card remains locked and no level routing/public unlock is introduced.
focused_tests:
  - HOME=/tmp/cobie-alpha7-vancouver-home /opt/homebrew/bin/godot --headless --editor --path repo --quit
  - HOME=/tmp/cobie-alpha7-vancouver-home /opt/homebrew/bin/godot --headless --path repo --script res://tests/integration/vancouver_route_foundation_test.gd
  - HOME=/tmp/cobie-alpha7-vancouver-home /opt/homebrew/bin/godot --headless --path repo --script res://tools/validate_content.gd
evidence_required:
  - One externally verifiable cohesive commit.
  - Full focused output with no attributable ERROR, leak, orphan, missing resource, public unlock, external asset, logo, private data, or legal-clearance claim.
out_of_scope:
  - Production geometry
  - Public level routing or unlock
  - New art/audio/photography/logos
  - Vancouver-only shared-system branches
  - Ruse Pizza branding or permission claims
  - Release metadata
time_limit_minutes: 50
